<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Pro Chat</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #0f172a;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 12px;
      text-align: center;
      font-weight: bold;
    }

    #users {
      padding: 8px;
      font-size: 12px;
      background: #020617;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
    }

    .sent {
      background: #3b82f6;
      align-self: flex-end;
    }

    .received {
      background: #334155;
      align-self: flex-start;
    }

    .sender {
      font-size: 11px;
      opacity: 0.7;
    }

    .status {
      font-size: 10px;
      opacity: 0.6;
    }

    #typing {
      font-size: 12px;
      padding: 5px;
    }

    #form {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    #input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #0f172a;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #3b82f6;
      color: white;
    }
  </style>
</head>

<body>

  <header>💬 Chat System</header>

  <div id="users"></div>
  <div id="chat-container"></div>
  <div id="typing"></div>

  <form id="form">
    <input id="input" placeholder="Type message..." />
    <button>Send</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>

  <script>
    // 👤 Username
    let username = localStorage.getItem("username");

    if (!username) {
      username = prompt("Enter your name:");
      localStorage.setItem("username", username);
    }

    const socket = io({
      auth: { username }
    });

    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const chat = document.getElementById("chat-container");
    const usersDiv = document.getElementById("users");
    const typingDiv = document.getElementById("typing");

    let counter = 0;

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (!input.value.trim()) return;

      const clientOffset = socket.id + "-" + counter++;

      socket.emit("chat message", input.value, clientOffset);
      input.value = "";
    });

    socket.on("chat message", (msg) => {
      const isMe = msg.sender === username;

      addMessage(msg.text, isMe ? "sent" : "received", msg.sender, msg.status, msg.id);

      if (!isMe) socket.emit("seen", msg.id);
    });

    socket.on("online users", (users) => {
      usersDiv.textContent = "🟢 Online: " + users.join(", ");
    });

    socket.on("typing", (user) => {
      typingDiv.textContent = user + " is typing...";
    });

    socket.on("stop typing", () => {
      typingDiv.textContent = "";
    });

    socket.on("message seen", (id) => {
      const el = document.getElementById("msg-" + id);
      if (el) el.textContent = "✔✔ Seen";
    });

    input.addEventListener("input", () => {
      socket.emit("typing");

      clearTimeout(window.typingTimeout);
      window.typingTimeout = setTimeout(() => {
        socket.emit("stop typing");
      }, 1000);
    });

    function addMessage(text, type, sender, status = "", id = "") {
      const div = document.createElement("div");
      div.classList.add("message", type);

      const senderDiv = document.createElement("div");
      senderDiv.classList.add("sender");
      senderDiv.textContent = sender;

      const msgDiv = document.createElement("div");
      msgDiv.textContent = text;

      const statusDiv = document.createElement("div");
      statusDiv.classList.add("status");
      statusDiv.id = "msg-" + id;
      statusDiv.textContent = status;

      div.appendChild(senderDiv);
      div.appendChild(msgDiv);
      div.appendChild(statusDiv);

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
  </script>

</body>

</html>
